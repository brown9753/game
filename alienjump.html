<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네트워크 연결 중</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #202124;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace, sans-serif;
            overflow: hidden;
        }

        #header {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 로딩 애니메이션 CSS */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 24px;
            margin: 5px 0;
            color: #e8eaed;
            display: flex;
            align-items: center;
        }

        #gameCanvas {
            background-color: #0b0c10;
            border: 2px solid #45a29e;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(69, 162, 158, 0.3);
            display: block;
        }

        p {
            color: #9aa0a6;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1><div class="loader"></div> 네트워크 연결 중</h1>
    </div>

    <canvas id="gameCanvas" width="800" height="300"></canvas>
    
    <p>스페이스바(Spacebar) 또는 위쪽 화살표(↑)를 눌러 달처럼 점프하세요!</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 게임 변수
        let frames = 0;
        let score = 0;
        let gameSpeed = 6;
        let gameOver = false;
        let obstacles = [];
        let stars = [];
        let planets = [];

        // 이벤트 변수
        let laserEventActive = false;
        let laserEventFrames = 0;
        let maxLaserFrames = 600; // 이벤트 지속 프레임 수
        let lastEventScore = 0; // 마지막으로 이벤트가 발생한 점수대
        let lasers = [];

        // 우주 배경 생성
        function initBackground() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height - 40),
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
            planets = [
                { x: 600, y: 80, radius: 30, color: '#ff6b6b', speed: 0.2, ring: true },
                { x: 200, y: 150, radius: 15, color: '#4ecdc4', speed: 0.1, ring: false }
            ];
        }

        // 플레이어(초록색 외계인) 객체 - 달의 중력 적용
        const alien = {
            x: 50,
            y: 220,
            width: 40,
            height: 40,
            dy: 0,
            jumpPower: -8,   
            gravity: 0.2,    
            grounded: true,

            draw() {
                ctx.fillStyle = '#39ff14';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x + 20, this.y + 10, 8, 8);
                ctx.fillRect(this.x + 8, this.y + 10, 8, 8);
                
                ctx.beginPath();
                ctx.moveTo(this.x + 20, this.y);
                ctx.lineTo(this.x + 20, this.y - 10);
                ctx.strokeStyle = '#39ff14';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(this.x + 20, this.y - 12, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'red';
                ctx.fill();
            },

            update() {
                if (!this.grounded) {
                    this.dy += this.gravity;
                    this.y += this.dy;
                }

                if (this.y + this.height >= canvas.height - 30) {
                    this.y = canvas.height - 30 - this.height;
                    this.dy = 0;
                    this.grounded = true;
                }
            },

            jump() {
                if (this.grounded) {
                    this.dy = this.jumpPower;
                    this.grounded = false;
                }
            }
        };

        // 적 외계인 (UFO에 탄 빨간 외계인) - 크기 유지
        const enemyAlien = {
            x: canvas.width + 50,
            targetX: 640,
            y: 30,
            alienWidth: 40,
            alienHeight: 40,
            ufoWidth: 120, 
            ufoHeight: 60, 
            visible: false,

            draw() {
                if (!this.visible) return;
                
                // 지정된 위치로 서서히 이동
                if (this.x > this.targetX) this.x -= 2;

                // UFO 그리기
                ctx.fillStyle = 'rgba(173, 216, 230, 0.7)';
                ctx.beginPath();
                ctx.arc(this.x + this.ufoWidth / 2, this.y + this.ufoHeight / 3, this.ufoWidth / 3, Math.PI, Math.PI * 2); 
                ctx.fill();

                ctx.fillStyle = '#9370db'; 
                ctx.beginPath();
                ctx.ellipse(this.x + this.ufoWidth / 2, this.y + this.ufoHeight / 1.5, this.ufoWidth / 2, this.ufoHeight / 3, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'yellow';
                ctx.fillRect(this.x + 30, this.y + 55, 8, 8);
                ctx.fillRect(this.x + 65, this.y + 58, 8, 8);
                ctx.fillRect(this.x + 100, this.y + 55, 8, 8);

                // 빨간색 적 외계인 그리기
                const alienStartX = this.x + (this.ufoWidth - this.alienWidth) / 2;
                const alienStartY = this.y + 10; 

                ctx.fillStyle = '#ff4d4d'; 
                ctx.fillRect(alienStartX, alienStartY, this.alienWidth, this.alienHeight);
                
                ctx.fillStyle = 'black';
                ctx.fillRect(alienStartX + 20, alienStartY + 10, 8, 8);
                ctx.fillRect(alienStartX + 8, alienStartY + 10, 8, 8);
                
                ctx.beginPath();
                ctx.moveTo(alienStartX + 20, alienStartY);
                ctx.lineTo(alienStartX + 20, alienStartY - 10);
                ctx.strokeStyle = '#ff4d4d';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(alienStartX + 20, alienStartY - 12, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'red';
                ctx.fill();
            }
        };

        // 레이저 총알 클래스
        class Laser {
            constructor(startX, startY) {
                this.x = startX;
                this.y = startY;
                this.speed = 7;
                
                let targetX = Math.random() * (canvas.width - 200); 
                let targetY = canvas.height - 30;
                
                let angle = Math.atan2(targetY - startY, targetX - startX);
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
            }

            draw() {
                ctx.strokeStyle = '#ff2222';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx * 3, this.y - this.vy * 3); 
                ctx.stroke();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        // 장애물 클래스
        class Obstacle {
            constructor(type) {
                this.type = type;
                this.x = canvas.width;
                
                if (this.type === 'satellite') {
                    this.width = 40;
                    this.height = 50;
                    this.y = canvas.height - 30 - this.height;
                } else if (this.type === 'ufo') {
                    this.width = 50;
                    this.height = 25;
                    this.y = canvas.height - 130 - this.height; 
                }
            }

            draw() {
                if (this.type === 'satellite') {
                    ctx.fillStyle = '#a0a0a0';
                    ctx.fillRect(this.x + 10, this.y, 20, this.height);
                    ctx.fillStyle = '#1e90ff';
                    ctx.fillRect(this.x - 5, this.y + 10, 15, 30);
                    ctx.fillRect(this.x + 30, this.y + 10, 15, 30);
                    ctx.fillStyle = 'orange';
                    ctx.fillRect(this.x + 15, this.y - 5, 10, 5);
                } else if (this.type === 'ufo') {
                    ctx.fillStyle = 'rgba(173, 216, 230, 0.8)';
                    ctx.beginPath();
                    ctx.arc(this.x + this.width/2, this.y + 5, 15, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#9370db';
                    ctx.beginPath();
                    ctx.ellipse(this.x + this.width/2, this.y + 15, 25, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = 'yellow';
                    ctx.fillRect(this.x + 10, this.y + 15, 4, 4);
                    ctx.fillRect(this.x + 23, this.y + 18, 4, 4);
                    ctx.fillRect(this.x + 36, this.y + 15, 4, 4);
                }
            }

            update() {
                this.x -= gameSpeed;
            }
        }

        // 키보드 이벤트
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                if (gameOver) {
                    resetGame();
                } else {
                    alien.jump();
                }
            }
        });

        function handleObstacles() {
            // 장애물 생성 간격
            const baseSpawnInterval = 100; 
            const spawnInterval = Math.max(60, Math.floor((baseSpawnInterval - (gameSpeed * 2.5)) * 1.5)); 

            if (frames % spawnInterval === 0) {
                const type = Math.random() < 0.6 ? 'satellite' : 'ufo';
                obstacles.push(new Obstacle(type));
            }

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.update();
                obs.draw();

                let hitBoxX = obs.x + 5;
                let hitBoxY = obs.y + 5;
                let hitBoxW = obs.width - 10;
                let hitBoxH = obs.height - 10;

                if (alien.x < hitBoxX + hitBoxW &&
                    alien.x + alien.width > hitBoxX &&
                    alien.y < hitBoxY + hitBoxH &&
                    alien.y + alien.height > hitBoxY) {
                    gameOver = true;
                }

                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }
        }

        function handleLaserEvent() {
            if (laserEventActive) {
                enemyAlien.draw();
                laserEventFrames++;

                // 약 0.5초(30프레임)마다 무작위 레이저 발사
                if (laserEventFrames % 30 === 0 && enemyAlien.x <= enemyAlien.targetX + 10) {
                    lasers.push(new Laser(enemyAlien.x + enemyAlien.ufoWidth / 2, enemyAlien.y + enemyAlien.ufoHeight / 1.5));
                }

                // 지정된 프레임(시간) 후 이벤트 종료
                if (laserEventFrames >= maxLaserFrames) {
                    laserEventActive = false;
                    enemyAlien.visible = false;
                    enemyAlien.x = canvas.width + 50; // 다음 이벤트를 위해 위치 초기화
                }
            }

            // 레이저 업데이트 및 충돌 검사
            for (let i = 0; i < lasers.length; i++) {
                let l = lasers[i];
                l.update();
                l.draw();

                let alienCenterX = alien.x + alien.width / 2;
                let alienCenterY = alien.y + alien.height / 2;
                
                if (Math.hypot(alienCenterX - l.x, alienCenterY - l.y) < 20) {
                    gameOver = true;
                }

                if (l.y > canvas.height || l.x < 0) {
                    lasers.splice(i, 1);
                    i--;
                }
            }
        }

        function drawBackgroundElements() {
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.x -= star.speed;
                if (star.x < 0) star.x = canvas.width;
            });

            planets.forEach(planet => {
                ctx.fillStyle = planet.color;
                ctx.beginPath();
                ctx.arc(planet.x, planet.y, planet.radius, 0, Math.PI * 2);
                ctx.fill();
                
                if(planet.ring) {
                    ctx.strokeStyle = '#f1c40f';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.ellipse(planet.x, planet.y, planet.radius * 1.5, planet.radius * 0.4, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }

                planet.x -= planet.speed;
                if (planet.x < -50) planet.x = canvas.width + 50;
            });

            ctx.strokeStyle = '#45a29e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 30);
            ctx.lineTo(canvas.width, canvas.height - 30);
            ctx.stroke();
        }

        function drawScore() {
            ctx.fillStyle = 'white';
            ctx.font = '20px Courier New';
            ctx.textAlign = 'right';
            ctx.fillText(`SCORE: ${Math.floor(score)}`, canvas.width - 20, 30);
            
            if (laserEventActive) {
                // 남은 시간을 초 단위로 계산하여 표시 (대략 60프레임 = 1초)
                let timeLeft = Math.ceil((maxLaserFrames - laserEventFrames) / 60);
                ctx.fillStyle = '#ff0044';
                ctx.textAlign = 'center';
                ctx.fillText(`⚠ 외계인 공격 중! (${timeLeft}초) ⚠`, canvas.width / 2, 40);
            }
        }

        function resetGame() {
            gameOver = false;
            obstacles = [];
            score = 0;
            gameSpeed = 6;
            frames = 0;
            
            // 이벤트 초기화
            laserEventActive = false;
            laserEventFrames = 0;
            lastEventScore = 0;
            lasers = [];
            enemyAlien.x = canvas.width + 50;
            enemyAlien.visible = false;

            alien.y = canvas.height - 30 - alien.height;
            alien.dy = 0;
            alien.grounded = true;
            initBackground();
            animate();
        }

        function animate() {
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'red';
                ctx.font = '40px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = 'white';
                ctx.font = '20px Courier New';
                ctx.fillText('스페이스바를 눌러 다시 시작', canvas.width / 2, canvas.height / 2 + 20);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackgroundElements();
            
            alien.update();
            alien.draw();
            
            handleObstacles();
            handleLaserEvent();
            drawScore();

            // 점수 상승 및 50점 이후 속도 점진적 가속
            score += 0.05;
            if (score >= 50 && gameSpeed < 14) {
                gameSpeed += 0.003; 
            }

            // 100점 단위 체크 및 이벤트 발동 (100점 간격으로)
            let currentHundred = Math.floor(score / 100) * 100;
            if (currentHundred >= 100 && currentHundred > lastEventScore && !laserEventActive) {
                laserEventActive = true;
                enemyAlien.visible = true;
                laserEventFrames = 0;
                lastEventScore = currentHundred; // 현재 이벤트 발동 점수 기록
                
                // 점수대별 지속 시간 설정 (60프레임 = 1초)
                if (currentHundred === 100) {
                    maxLaserFrames = 600; // 10초
                } else if (currentHundred === 200) {
                    maxLaserFrames = 900; // 15초
                } else {
                    maxLaserFrames = 1200; // 300점 이상은 20초
                }
            }

            frames++;
            requestAnimationFrame(animate);
        }

        initBackground();
        animate();
    </script>
</body>
</html>
